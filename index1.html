<style>
:root{--green:#00C170;--green-dim:#00C17018;--green-mid:#00C17055;--gold:#F5C842;--bg:#0A0E14;--bg2:#111820;--bg3:#1A2230;--text:#EEF2F7;--text2:#7A8FA6;--text3:#4A5F75;--border:#1E2D3D;--red:#E84040;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--green)}
.logo span{color:var(--text2);font-size:14px;margin-left:6px}
.upill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{flex:1;min-width:72px;padding:12px 6px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:none;text-transform:uppercase;letter-spacing:.7px;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.panel{display:none;padding:16px;max-width:700px;margin:0 auto;padding-bottom:80px}
.panel.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.card h2{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:6px}
.card p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;transition:border .2s}
.field input:focus{border-color:var(--green)}
.btn-p{width:100%;background:var(--green);border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;color:#000;cursor:pointer;transition:opacity .2s;margin-top:4px}
.btn-p:hover{opacity:.85}
.btn-s{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;width:100%;margin-top:8px}
.btn-s:hover{border-color:var(--green);color:var(--green)}
.msg{font-size:12px;padding:8px 12px;border-radius:6px;margin-top:8px}
.msg.ok{background:#00C17015;color:var(--green);border:1px solid var(--green-mid)}
.msg.err{background:#E8404015;color:var(--red);border:1px solid #E8404055}
.save-float{position:fixed;bottom:16px;right:16px;background:var(--green);border:none;border-radius:28px;padding:12px 22px;font-size:13px;font-weight:700;color:#000;cursor:pointer;z-index:200;box-shadow:0 4px 20px #00C17050;display:none}
.g-hdr{display:flex;align-items:center;gap:10px;margin:18px 0 7px}
.g-lbl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--green)}
.g-line{flex:1;height:1px;background:var(--border)}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;margin-bottom:5px;transition:border .2s}
.mc.filled{border-color:#1E3D30}
.mc.exact{border-color:var(--green);background:#00C17008}
.mc.winner{border-color:var(--gold);background:#F5C84208}
.mc.locked .si{opacity:.35;pointer-events:none;cursor:not-allowed}
.mi{display:grid;grid-template-columns:1fr 36px 14px 36px 1fr;align-items:center;gap:5px}
.tn{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tn.h{text-align:right}.tn.a{text-align:left}
.si{width:36px;height:30px;text-align:center;font-size:14px;font-weight:700;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none;-moz-appearance:textfield}
.si::-webkit-outer-spin-button,.si::-webkit-inner-spin-button{-webkit-appearance:none}
.si:focus{border-color:var(--green)}
.vs{font-size:11px;color:var(--text3);text-align:center;font-weight:700}
.mm{font-size:10px;color:var(--text3);text-align:center;margin-top:4px}
.mm.ex{color:var(--green);font-weight:600}
.mm.win{color:var(--gold);font-weight:600}
.mm.closed{color:var(--red)}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.sbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
.sbox .n{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--green)}
.sbox .l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.rtable{width:100%;border-collapse:collapse}
.rtable th{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:7px 8px;border-bottom:1px solid var(--border);text-align:left}
.rtable td{padding:10px 8px;border-bottom:1px solid var(--border);font-size:13px}
.rtable tr:last-child td{border-bottom:none}
.rtable tr.me td{background:var(--green-dim)}
.pts{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green);text-align:right}
.lupd{font-size:11px;color:var(--text3);text-align:right;margin-bottom:10px;display:flex;justify-content:flex-end;align-items:center;gap:8px}
.rbtn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text3);cursor:pointer}
.rbtn:hover{border-color:var(--green);color:var(--green)}
.ahdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ag{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);letter-spacing:1px;margin:12px 0 4px}
.am{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;margin-bottom:4px}
.am.done{border-color:#2A3A20}
.ami{display:grid;grid-template-columns:1fr 36px 12px 36px 1fr;align-items:center;gap:5px}
.ai{width:36px;height:30px;text-align:center;font-size:14px;font-weight:700;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none;-moz-appearance:textfield}
.ai::-webkit-outer-spin-button,.ai::-webkit-inner-spin-button{-webkit-appearance:none}
.ai:focus{border-color:var(--gold)}
.savebtn{background:var(--gold);border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;color:#000;cursor:pointer}
.banner{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 13px;margin-bottom:14px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.banner span{color:var(--gold);font-weight:600}
.prog-wrap{background:var(--bg3);border-radius:8px;height:5px;overflow:hidden;margin:8px 0 14px}
.prog-bar{height:5px;background:var(--green);border-radius:8px;transition:width .4s}
</style>

let currentUser = null, adminOk = false, localPron = {}, results = {}, allParticipants = {}, dirty = false;

function getWinner(h,a){ return h>a?'h':a>h?'a':'e'; }
function isLocked(m){ return new Date() >= new Date(m.lock+':00-05:00'); }
function timeUntilLock(m){
  const diff = new Date(m.lock+':00-05:00') - new Date();
  if(diff<=0) return null;
  const h=Math.floor(diff/3600000), min=Math.floor((diff%3600000)/60000);
  if(h>24) return null;
  return h>0?`Cierra en ${h}h ${min}m`:`Cierra en ${min}m`;
}

function fbGet(path){ return db.ref(path).once('value').then(s=>s.exists()?s.val():null); }
function fbSet(path,val){ return db.ref(path).set(val); }
function fbListen(path,cb){ db.ref(path).on('value',s=>cb(s.exists()?s.val():{})); }

async function init(){
  const saved = localStorage.getItem('polla26_user');
  if(saved){ currentUser=saved; setUserPill(saved); localPron=await fbGet('participants/'+saved)||{}; }
  results = await fbGet('results')||{};
  allParticipants = await fbGet('participants')||{};
  renderReg(); renderRanking(); renderAdminLogin();
  fbListen('results',val=>{ results=val||{}; if(document.getElementById('p-ranking').classList.contains('active')) renderRanking(); if(document.getElementById('p-fixture').classList.contains('active')&&currentUser) renderFixture(); });
  fbListen('participants',val=>{ allParticipants=val||{}; if(document.getElementById('p-ranking').classList.contains('active')) renderRanking(); });
  setInterval(()=>{ if(document.getElementById('p-fixture').classList.contains('active')&&currentUser) renderFixture(); },60000);
}

function goTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['inicio','fixture','ranking','admin'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+t).classList.add('active');
  document.getElementById('sfloat').style.display=(t==='fixture'&&currentUser)?'block':'none';
  if(t==='fixture'&&currentUser) renderFixture();
  if(t==='ranking') renderRanking();
  if(t==='admin'&&adminOk) renderAdminPanel();
}

function setUserPill(name){ document.getElementById('udot').style.background='var(--green)'; document.getElementById('uname').textContent=name; }

function logoutUser(){
  if(!currentUser) return;
  currentUser=null; localPron={};
  localStorage.removeItem('polla26_user');
  document.getElementById('udot').style.background='var(--text3)';
  document.getElementById('uname').textContent='Entrar';
  document.getElementById('sfloat').style.display='none';
  renderReg(); goTab('inicio');
}

  if(currentUser){
    const n=Object.keys(localPron).length;
    el.innerHTML=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div style="width:42px;height:42px;background:var(--green-dim);border:1px solid var(--green-mid);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--green)">${currentUser[0].toUpperCase()}</div><div><div style="font-size:15px;font-weight:700">${currentUser}</div><div style="font-size:11px;color:var(--text3)">${n} de ${MATCHES.length} partidos pronosticados</div></div></div><div class="prog-wrap"><div class="prog-bar" style="width:${Math.round(n/MATCHES.length*100)}%"></div></div><button class="btn-p" onclick="goTab('fixture')">✏️ Ir a Pronósticos</button><button class="btn-s" onclick="logoutUser()">Cambiar de usuario</button><div class="banner" style="margin-top:14px">⏰ Pronósticos bloqueados <span>1 hora antes</span> de cada partido · 🎯 Exacto=3pts · 🏆 Ganador=1.5pts</div>`;
  } else {
    el.innerHTML=`<div class="banner">🏆 48 partidos · 12 grupos · <span>Exacto=3pts · Ganador=1.5pts</span></div><div class="card"><h2>Únete a la polla</h2><p>Escribe tu nombre. Si ya participaste antes, escribe el mismo nombre para continuar.</p><div class="field"><label>Tu nombre</label><input id="rname" placeholder="Ej: Lázaro" onkeydown="if(event.key==='Enter')doReg()"/></div><div id="rmsg"></div><button class="btn-p" onclick="doReg()">Entrar y pronosticar →</button></div>`;
  }
}

async function doReg(){
  const name=document.getElementById('rname')?.value.trim();
  if(!name){showMsg('rmsg','err','Escribe tu nombre');return;}
  showMsg('rmsg','ok','Conectando...');
  const existing=await fbGet('participants/'+name);
  localPron=existing||{};
  if(!existing) await fbSet('participants/'+name,{});
  currentUser=name;
  localStorage.setItem('polla26_user',name);
  setUserPill(name);
  setTimeout(()=>{renderReg();goTab('fixture');},500);
}

function renderFixture(){
  if(!currentUser) return;
  const pron=localPron||{};
  const groups=['A','B','C','D','E','F','G','H','I','J','K','L'];
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px"><div style="font-size:12px;color:var(--text2)">Completados: <strong style="color:var(--green)">${Object.keys(pron).length}/${MATCHES.length}</strong></div><div style="font-size:11px;color:var(--text3)">🔒 Bloqueo 1h antes · 🎯 3pts · 🏆 1.5pts</div></div>`;
  for(const g of groups){
    html+=`<div class="g-hdr"><div class="g-lbl">Grupo ${g}</div><div class="g-line"></div></div>`;
    for(const m of MATCHES.filter(x=>x.g===g)){
      const v=pron[m.id], r=results[m.id];
      const timeLocked=isLocked(m), adminLocked=r!==undefined, locked=timeLocked||adminLocked;
      const isExact=adminLocked&&v&&v.h===r.h&&v.a===r.a;
      const isWin=adminLocked&&v&&!isExact&&r&&getWinner(v.h,v.a)===getWinner(r.h,r.a);
      const countdown=timeUntilLock(m);
      let meta=m.label, mc='';
      if(isExact){meta=`✓ EXACTO +3pts — ${r.h}–${r.a}`;mc='ex';}
      else if(isWin){meta=`🏆 Ganador +1.5pts — Res: ${r.h}–${r.a}`;mc='win';}
      else if(adminLocked&&r){meta=`${m.label} · Res: ${r.h}–${r.a}`;}
      else if(timeLocked){meta=`${m.label} · 🔒 Cerrado`;mc='closed';}
      else if(countdown){meta=`${m.label} · ⏰ ${countdown}`;}
      html+=`<div class="mc ${v?'filled':''} ${isExact?'exact':''} ${isWin?'winner':''} ${locked?'locked':''}"><div class="mi"><div class="tn h">${m.h}</div><input class="si" type="number" min="0" max="30" placeholder="?" id="fh-${m.id}" value="${v!==undefined?v.h:''}" ${locked?'disabled':''} oninput="dirty=true"><div class="vs">–</div><input class="si" type="number" min="0" max="30" placeholder="?" id="fa-${m.id}" value="${v!==undefined?v.a:''}" ${locked?'disabled':''} oninput="dirty=true"><div class="tn a">${m.a}</div></div><div class="mm ${mc}">${meta}</div></div>`;
    }
  }
  document.getElementById('fix').innerHTML=html;
}

async function saveAll(){
  if(!currentUser) return;
  const btn=document.getElementById('sfloat');
  btn.textContent='⏳ Guardando...';
  for(const m of MATCHES){
    if(isLocked(m)) continue;
    const h=document.getElementById('fh-'+m.id), a=document.getElementById('fa-'+m.id);
    if(h&&a&&h.value!==''&&a.value!=='') localPron[m.id]={h:parseInt(h.value),a:parseInt(a.value)};
  }
  await fbSet('participants/'+currentUser,localPron);
  dirty=false;
  btn.textContent='✓ Guardado';
  setTimeout(()=>{btn.textContent='💾 Guardar';renderFixture();},1500);
}

function calcPts(name){
  const pron=allParticipants[name]||{};
  let pts=0,exact=0,winner=0,total=Object.keys(pron).length;
  for(const m of MATCHES){
    const v=pron[m.id],r=results[m.id];
    if(!v||!r) continue;
    if(v.h===r.h&&v.a===r.a){pts+=3;exact++;}
    else if(getWinner(v.h,v.a)===getWinner(r.h,r.a)){pts+=1.5;winner++;}
  }
  return{pts,exact,winner,total};
}

function renderRanking(){
  const el=document.getElementById('rank');
  const names=Object.keys(allParticipants);
  const rc=Object.keys(results).length;
  const now=new Date().toLocaleString('es-CO',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'});
  if(!names.length){el.innerHTML='<p style="color:var(--text2);padding:20px 0">Nadie se ha registrado aún.</p>';return;}
  const ranked=names.map(n=>({n,...calcPts(n)})).sort((a,b)=>b.pts-a.pts||b.exact-a.exact||b.winner-a.winner);
  const pos=i=>['🥇','🥈','🥉'][i]||(i+1)+'°';
  el.innerHTML=`<div class="lupd">${now} <button class="rbtn" onclick="renderRanking()">↺ Actualizar</button></div><div class="stat-row"><div class="sbox"><div class="n">${names.length}</div><div class="l">Jugadores</div></div><div class="sbox"><div class="n">${rc}</div><div class="l">Jugados</div></div><div class="sbox"><div class="n" style="font-size:18px">3/1.5</div><div class="l">Exacto/Ganador</div></div></div><div style="font-size:11px;color:var(--text3);margin-bottom:10px">🎯 Exacto=3pts &nbsp;·&nbsp; 🏆 Ganador=1.5pts</div><table class="rtable"><thead><tr><th>#</th><th>Nombre</th><th>🎯</th><th>🏆</th><th style="text-align:right">Pts</th></tr></thead><tbody>${ranked.map((r,i)=>`<tr ${r.n===currentUser?'class="me"':''}><td>${pos(i)}</td><td style="font-weight:600">${r.n}${r.n===currentUser?' <span style="font-size:10px;color:var(--green)">(tú)</span>':''}</td><td style="color:var(--green)">${r.exact}</td><td style="color:var(--gold)">${r.winner}</td><td class="pts">${r.pts}</td></tr>`).join('')}</tbody></table>`;
}

function renderAdminLogin(){
  document.getElementById('adm').innerHTML=`<div class="card" style="max-width:360px"><h2>Administrador</h2><p>Ingresa resultados reales. Los pronósticos se bloquean automáticamente 1h antes de cada partido.</p><div class="field"><label>Contraseña</label><input type="password" id="apass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminLogin()"/></div><div id="amsg"></div><button class="btn-p" onclick="doAdminLogin()">Entrar como admin</button></div>`;
}

function doAdminLogin(){
  const p=document.getElementById('apass')?.value;
  if(p===ADMIN_PASS){adminOk=true;renderAdminPanel();}
  else showMsg('amsg','err','Contraseña incorrecta');
}

function renderAdminPanel(){
  const el=document.getElementById('adm');
  const groups=['A','B','C','D','E','F','G','H','I','J','K','L'];
  let html=`<div class="ahdr"><span style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold)">Panel Admin</span><button class="savebtn" onclick="saveResults()">Guardar resultados →</button></div><div style="font-size:12px;color:var(--text2);margin-bottom:12px">${Object.keys(results).length} resultados ingresados</div>`;
  for(const g of groups){
    html+=`<div class="ag">Grupo ${g}</div>`;
    for(const m of MATCHES.filter(x=>x.g===g)){
      const r=results[m.id]||{};
      html+=`<div class="am ${r.h!==undefined?'done':''}"><div class="ami"><div class="tn h" style="font-size:11px">${m.h}</div><input class="ai" type="number" min="0" max="30" placeholder="?" id="rh-${m.id}" value="${r.h!==undefined?r.h:''}"><div class="vs" style="font-size:11px;color:var(--text3)">–</div><input class="ai" type="number" min="0" max="30" placeholder="?" id="ra-${m.id}" value="${r.a!==undefined?r.a:''}"><div class="tn a" style="font-size:11px">${m.a}</div></div><div class="mm">${m.label}</div></div>`;
    }
  }
  html+=`<div style="margin-top:14px"><button class="savebtn" style="width:100%" onclick="saveResults()">Guardar todos los resultados</button></div>`;
  el.innerHTML=html;
}

async function saveResults(){
  document.querySelectorAll('.savebtn').forEach(b=>b.textContent='Guardando...');
  for(const m of MATCHES){
    const h=document.getElementById('rh-'+m.id), a=document.getElementById('ra-'+m.id);
    if(h&&a&&h.value!==''&&a.value!=='') results[m.id]={h:parseInt(h.value),a:parseInt(a.value)};
  }
  await fbSet('results',results);
  allParticipants=await fbGet('participants')||{};
  renderAdminPanel(); renderRanking();
  document.querySelectorAll('.savebtn').forEach(b=>{b.textContent='✓ Guardado';setTimeout(()=>b.textContent='Guardar resultados →',2000);});
}

function showMsg(id,type,text){const el=document.getElementById(id);if(el){el.className='msg '+type;el.textContent=text;}}
window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue='';}});
init();
</script>
</body>
</html>
