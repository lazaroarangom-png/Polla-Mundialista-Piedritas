<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Polla Mundial 2026 🏆</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --green: #00C170;
  --green-dim: #00C17022;
  --green-mid: #00C17055;
  --gold: #F5C842;
  --silver: #A8B2BD;
  --bronze: #CD7F32;
  --bg: #0A0E14;
  --bg2: #111820;
  --bg3: #1A2230;
  --bg4: #222E3C;
  --text: #EEF2F7;
  --text2: #7A8FA6;
  --text3: #4A5F75;
  --border: #1E2D3D;
  --red: #E84040;
  --radius: 10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--green)}
.logo span{color:var(--text2);font-size:16px;margin-left:8px;letter-spacing:1px}
.user-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;background:var(--green);border-radius:50%;display:inline-block}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;min-width:80px;padding:13px 8px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:none;text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--green);border-bottom-color:var(--green)}

/* PANELS */
.panel{display:none;padding:20px;max-width:700px;margin:0 auto}.panel.active{display:block}

/* REGISTRO */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--text);margin-bottom:6px}
.card p{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;transition:border .2s}
.field input:focus{border-color:var(--green)}
.btn-primary{width:100%;background:var(--green);border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;color:#000;cursor:pointer;letter-spacing:.5px;transition:opacity .2s}
.btn-primary:hover{opacity:.85}
.btn-sec{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s}
.btn-sec:hover{border-color:var(--green);color:var(--green)}
.msg{font-size:12px;padding:8px 12px;border-radius:6px;margin-top:8px}
.msg.ok{background:#00C17015;color:var(--green);border:1px solid var(--green-mid)}
.msg.err{background:#E8404015;color:var(--red);border:1px solid #E8404055}

/* FIXTURE */
.save-float{position:fixed;bottom:20px;right:20px;background:var(--green);border:none;border-radius:30px;padding:12px 24px;font-size:14px;font-weight:700;color:#000;cursor:pointer;z-index:200;box-shadow:0 4px 20px #00C17040;display:none;transition:transform .1s}
.save-float:active{transform:scale(.96)}
.group-hdr{display:flex;align-items:center;gap:10px;margin:20px 0 8px}
.group-hdr .g-label{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--green)}
.group-hdr .g-line{flex:1;height:1px;background:var(--border)}
.match-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;transition:border .2s}
.match-card.filled{border-color:var(--green-mid)}
.match-card.exact{border-color:var(--green);background:#00C17008}
.match-card.locked .sinp{opacity:.4;pointer-events:none;cursor:not-allowed}
.match-inner{display:grid;grid-template-columns:1fr 38px 18px 38px 1fr;align-items:center;gap:6px}
.tn{font-size:12px;font-weight:600}
.tn.h{text-align:right}.tn.a{text-align:left}
.sinp{width:38px;height:32px;text-align:center;font-size:15px;font-weight:700;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none;transition:border .2s}
.sinp:focus{border-color:var(--green)}
.vsep{font-size:12px;color:var(--text3);text-align:center;font-weight:700}
.match-meta{font-size:10px;color:var(--text3);text-align:center;margin-top:5px;letter-spacing:.3px}
.match-meta.exact-label{color:var(--green);font-weight:600}
.match-meta .res-real{color:var(--text2)}

/* RANKING */
.rank-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-box .n{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--green);letter-spacing:1px}
.stat-box .l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}
.rank-table td{padding:11px 10px;border-bottom:1px solid var(--border);font-size:13px}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr.me td{background:var(--green-dim)}
.pos-ico{font-size:18px;min-width:24px;display:inline-block}
.pts-cell{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green);text-align:right;letter-spacing:1px}
.hits-bar{height:3px;background:var(--bg4);border-radius:2px;margin-top:3px;overflow:hidden}
.hits-fill{height:3px;background:var(--green);border-radius:2px}
.last-update{font-size:11px;color:var(--text3);text-align:right;margin-bottom:12px}
.refresh-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--text3);cursor:pointer;margin-left:8px}
.refresh-btn:hover{border-color:var(--green);color:var(--green)}

/* ADMIN */
.admin-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.admin-hdr h2{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px}
.amatch{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:5px;transition:border .2s}
.amatch.done{border-color:var(--green-mid)}
.amatch-inner{display:grid;grid-template-columns:1fr 38px 14px 38px 1fr;align-items:center;gap:6px}
.ainp{width:38px;height:32px;text-align:center;font-size:15px;font-weight:700;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none}
.ainp:focus{border-color:var(--gold)}
.tn-sm{font-size:11px;font-weight:600}
.tn-sm.h{text-align:right}.tn-sm.a{text-align:left}
.ameta{font-size:10px;color:var(--text3);text-align:center;margin-top:3px}
.save-admin{background:var(--gold);border:none;border-radius:8px;padding:11px 24px;font-size:14px;font-weight:700;color:#000;cursor:pointer;transition:opacity .2s}
.save-admin:hover{opacity:.85}
.admin-group-hdr{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);letter-spacing:1px;margin:14px 0 5px}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.spinner{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* DEADLINE BANNER */
.deadline-banner{background:linear-gradient(135deg,#1A2230,#0A1520);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px}
.deadline-banner span{color:var(--gold);font-weight:600}

@media(max-width:480px){
  .header{padding:0 14px}
  .panel{padding:14px}
  .rank-stats{grid-template-columns:repeat(3,1fr)}
  .stat-box .n{font-size:24px}
}
</style>
</head>

let db = { participants:{}, results:{} };
let currentUser = null;
let adminOk = false;
let dirty = false;

// ---- STORAGE via Anthropic API ----
async function apiCall(prompt, sys) {
  try {
    const r = await fetch(API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model: MODEL, max_tokens: 1000,
        system: sys || 'Responde SOLO con JSON válido, sin texto adicional ni backticks.',
        messages:[{role:'user',content: prompt}]
      })
    });
    const d = await r.json();
    const txt = d.content?.filter(c=>c.type==='text').map(c=>c.text).join('') || '{}';
    return JSON.parse(txt.replace(/```json|```/g,'').trim());
  } catch(e) { return null; }
}

async function loadDB() {
  const res = await apiCall(
    `Tengo una base de datos de una polla de fútbol guardada en la clave "${STORE_KEY}". ` +
    `Si tienes datos guardados de sesiones anteriores para esa clave, devuélvelos exactamente como JSON con la estructura {participants:{}, results:{}}. ` +
    `Si no tienes datos, devuelve {"participants":{},"results":{}}.`
  );
  if (res && res.participants) db = res;
}

async function saveDB() {
  await apiCall(
    `Guarda esta base de datos para la clave "${STORE_KEY}" y confírmalo con {"ok":true}: ` + JSON.stringify(db),
    'Eres un sistema de almacenamiento. Guarda el JSON recibido asociado a la clave indicada y responde solo {"ok":true}.'
  );
}

// Fallback: localStorage para sesión local
function loadLocal() {
  try { const s = localStorage.getItem(STORE_KEY); if(s) db = JSON.parse(s); } catch(e){}
}
function saveLocal() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(db)); } catch(e){}
}

// ---- INIT ----
async function init() {
  loadLocal();
  renderReg();
  renderRanking();
  renderAdminLogin();
  showSaveFloat(false);
}

// ---- TABS ----
function switchTab(t) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab===t));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  showSaveFloat(t==='fixture' && !!currentUser);
  if(t==='fixture' && currentUser) renderFixture();
  if(t==='ranking') renderRanking();
  if(t==='admin' && adminOk) renderAdminPanel();
}

function showSaveFloat(v) {
  document.getElementById('save-float').style.display = v ? 'block' : 'none';
}

// ---- REGISTRO ----
function renderReg() {
  const el = document.getElementById('reg-content');
  if(currentUser) {
    const pron = db.participants[currentUser] || {};
    const n = Object.keys(pron).length;
    el.innerHTML = `
      <div style="margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <div style="width:44px;height:44px;background:#00C17022;border:1px solid var(--green-mid);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--green)">${currentUser[0].toUpperCase()}</div>
          <div><div style="font-size:16px;font-weight:700">${currentUser}</div><div style="font-size:11px;color:var(--text3)">${n} de ${MATCHES.length} partidos pronosticados</div></div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;height:6px;overflow:hidden;margin-bottom:16px">
          <div style="height:6px;background:var(--green);width:${Math.round(n/MATCHES.length*100)}%;transition:width .3s;border-radius:8px"></div>
        </div>
        <button class="btn-primary" style="margin-bottom:10px" onclick="switchTab('fixture')">✏️ Ir a Pronósticos</button>
        <button class="btn-sec" style="width:100%" onclick="logoutUser()">Cambiar de usuario</button>
      </div>
      <div class="deadline-banner">⏰ Cierre de pronósticos: <span>Antes del partido</span> — Una vez ingresado el resultado, el partido se bloquea</div>`;
  } else {
    el.innerHTML = `
      <div class="deadline-banner" style="margin-bottom:16px">⏰ 48 partidos · Fase de grupos completa · <span>3 pts por exacto</span></div>
      <div class="card">
        <h2>Únete a la polla</h2>
        <p>Escribe tu nombre para registrarte. Si ya participaste antes, escribe el mismo nombre para continuar.</p>
        <div class="field"><label>Tu nombre</label><input id="rname" placeholder="Ej: Lázaro" onkeydown="if(event.key==='Enter')doRegister()"/></div>
        <div id="reg-msg"></div>
        <button class="btn-primary" onclick="doRegister()">Entrar y pronosticar →</button>
      </div>`;
  }
}

function doRegister() {
  const name = document.getElementById('rname')?.value.trim();
  if(!name) { showMsg('reg-msg','err','Escribe tu nombre'); return; }
  if(!db.participants[name]) db.participants[name] = {};
  currentUser = name;
  saveLocal();
  document.getElementById('dot-status').style.background = 'var(--green)';
  document.getElementById('pill-text').textContent = name;
  showMsg('reg-msg','ok','¡Bienvenido! Cargando fixture...');
  setTimeout(()=>{ renderReg(); switchTab('fixture'); }, 600);
}

function logoutUser() {
  if(!currentUser) return;
  currentUser = null;
  document.getElementById('dot-status').style.background = 'var(--text3)';
  document.getElementById('pill-text').textContent = 'Entrar';
  showSaveFloat(false);
  renderReg();
  switchTab('inicio');
}

// ---- FIXTURE ----
function renderFixture() {
  if(!currentUser) { document.getElementById('fixture-content').innerHTML = '<p style="color:var(--text2);padding:20px 0">Regístrate primero en Inicio.</p>'; return; }
  const pron = db.participants[currentUser] || {};
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
    <div style="font-size:12px;color:var(--text2)">Completados: <strong style="color:var(--green)">${Object.keys(pron).length}/${MATCHES.length}</strong></div>
    <div style="font-size:11px;color:var(--text3)">Los partidos con resultado real quedan bloqueados</div>
  </div>`;
  for(const g of groups) {
    html += `<div class="group-hdr"><div class="g-label">Grupo ${g}</div><div class="g-line"></div></div>`;
    for(const m of MATCHES.filter(x=>x.g===g)) {
      const v = pron[m.id];
      const r = db.results[m.id];
      const hit = r && v && v.h===r.h && v.a===r.a;
      const locked = r !== undefined;
      let metaTxt = m.date;
      if(locked && r) metaTxt += ` · Res: ${r.h}–${r.a}`;
      if(hit) metaTxt = `✓ EXACTO — ${m.date}: ${r.h}–${r.a}`;
      html += `<div class="match-card ${v?'filled':''} ${hit?'exact':''} ${locked?'locked':''}" id="mc-${m.id}">
        <div class="match-inner">
          <div class="tn h">${m.h}</div>
          <input class="sinp" type="number" min="0" max="30" placeholder="?" id="fh-${m.id}" value="${v?v.h:''}" ${locked?'disabled':''} oninput="markDirty()">
          <div class="vsep">–</div>
          <input class="sinp" type="number" min="0" max="30" placeholder="?" id="fa-${m.id}" value="${v?v.a:''}" ${locked?'disabled':''} oninput="markDirty()">
          <div class="tn a">${m.a}</div>
        </div>
        <div class="match-meta ${hit?'exact-label':''}">${metaTxt}</div>
      </div>`;
    }
  }
  document.getElementById('fixture-content').innerHTML = html;
}

function markDirty() { dirty = true; }

function saveAll() {
  if(!currentUser) return;
  if(!db.participants[currentUser]) db.participants[currentUser]={};
  let cnt = 0;
  for(const m of MATCHES) {
    const h = document.getElementById('fh-'+m.id);
    const a = document.getElementById('fa-'+m.id);
    if(h && a && h.value!=='' && a.value!=='') {
      db.participants[currentUser][m.id] = {h:parseInt(h.value), a:parseInt(a.value)};
      cnt++;
    }
  }
  saveLocal();
  dirty = false;
  const btn = document.getElementById('save-float');
  btn.textContent = '✓ Guardado';
  setTimeout(()=>{ btn.textContent='💾 Guardar'; renderFixture(); },1200);
}

// ---- RANKING ----
function calcPts(name) {
  const pron = db.participants[name]||{};
  let pts=0,hits=0,total=Object.keys(pron).length;
  for(const m of MATCHES) {
    const v=pron[m.id], r=db.results[m.id];
    if(v&&r&&v.h===r.h&&v.a===r.a){pts+=3;hits++;}
  }
  return {pts,hits,total};
}

function renderRanking() {
  const el = document.getElementById('ranking-content');
  const names = Object.keys(db.participants);
  const resCount = Object.keys(db.results).length;
  const now = new Date().toLocaleString('es-CO',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'});
  if(!names.length){
    el.innerHTML='<p style="color:var(--text2);padding:20px 0">Nadie se ha registrado aún.</p>'; return;
  }
  const ranked = names.map(n=>({n,...calcPts(n)})).sort((a,b)=>b.pts-a.pts||b.hits-a.hits||b.total-a.total);
  const maxPts = ranked[0]?.pts||1;
  const pos = i => ['🥇','🥈','🥉'][i]||(i+1+'°');
  el.innerHTML = `
    <div class="last-update">Actualizado: ${now} <button class="refresh-btn" onclick="renderRanking()">↺ Actualizar</button></div>
    <div class="rank-stats">
      <div class="stat-box"><div class="n">${names.length}</div><div class="l">Jugadores</div></div>
      <div class="stat-box"><div class="n">${resCount}</div><div class="l">Jugados</div></div>
      <div class="stat-box"><div class="n">3pts</div><div class="l">Por exacto</div></div>
    </div>
    <table class="rank-table">
      <thead><tr><th>#</th><th>Nombre</th><th>Pronos</th><th>Exactos</th><th style="text-align:right">Pts</th></tr></thead>
      <tbody>${ranked.map((r,i)=>`<tr ${r.n===currentUser?'class="me"':''}>
        <td><span class="pos-ico">${pos(i)}</span></td>
        <td style="font-weight:600">${r.n}${r.n===currentUser?' <span style="font-size:10px;color:var(--green)">(tú)</span>':''}</td>
        <td style="color:var(--text3)">${r.total}</td>
        <td>
          <div>${r.hits}</div>
          <div class="hits-bar"><div class="hits-fill" style="width:${resCount?Math.round(r.hits/resCount*100):0}%"></div></div>
        </td>
        <td class="pts-cell">${r.pts}</td>
      </tr>`).join('')}</tbody>
    </table>`;
}

// ---- ADMIN ----
function renderAdminLogin() {
  document.getElementById('admin-content').innerHTML = `
    <div class="card" style="max-width:360px">
      <h2>Administrador</h2>
      <p>Solo el admin puede ingresar resultados reales y bloquear pronósticos.</p>
      <div class="field"><label>Contraseña</label><input type="password" id="apass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminLogin()"/></div>
      <div id="admin-msg"></div>
      <button class="btn-primary" onclick="doAdminLogin()">Entrar como administrador</button>
    </div>`;
}

function doAdminLogin() {
  const p = document.getElementById('apass')?.value;
  if(p===ADMIN_PASS){ adminOk=true; renderAdminPanel(); }
  else showMsg('admin-msg','err','Contraseña incorrecta');
}

function renderAdminPanel() {
  const el = document.getElementById('admin-content');
  const resCount = Object.keys(db.results).length;
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  let html = `<div class="admin-hdr">
    <h2 style="color:var(--gold)">Panel Admin</h2>
    <button class="save-admin" onclick="saveResults()">Guardar y calcular →</button>
  </div>
  <div style="font-size:12px;color:var(--text2);margin-bottom:14px">${resCount} resultados ingresados · Al guardar se bloquean esos partidos para todos</div>`;
  for(const g of groups){
    html+=`<div class="admin-group-hdr">Grupo ${g}</div>`;
    for(const m of MATCHES.filter(x=>x.g===g)){
      const r=db.results[m.id]||{};
      html+=`<div class="amatch ${r.h!==undefined?'done':''}" id="am-${m.id}">
        <div class="amatch-inner">
          <div class="tn-sm h">${m.h}</div>
          <input class="ainp" type="number" min="0" max="30" placeholder="?" id="rh-${m.id}" value="${r.h!==undefined?r.h:''}">
          <div class="vsep" style="font-size:11px;color:var(--text3)">–</div>
          <input class="ainp" type="number" min="0" max="30" placeholder="?" id="ra-${m.id}" value="${r.a!==undefined?r.a:''}">
          <div class="tn-sm a">${m.a}</div>
        </div>
        <div class="ameta">${m.date}</div>
      </div>`;
    }
  }
  html+=`<div style="margin-top:16px"><button class="save-admin" style="width:100%" onclick="saveResults()">Guardar todos los resultados y calcular clasificación</button></div>`;
  el.innerHTML = html;
}

function saveResults() {
  for(const m of MATCHES){
    const h=document.getElementById('rh-'+m.id);
    const a=document.getElementById('ra-'+m.id);
    if(h&&a&&h.value!==''&&a.value!==''){
      db.results[m.id]={h:parseInt(h.value),a:parseInt(a.value)};
    }
  }
  saveLocal();
  renderAdminPanel();
  renderRanking();
  if(currentUser) renderFixture();
  const btns = document.querySelectorAll('.save-admin');
  btns.forEach(b=>{ b.textContent='✓ Guardado y calculado'; setTimeout(()=>b.textContent='Guardar y calcular →',1800); });
}

// ---- UTILS ----
function showMsg(id,type,text){
  const el=document.getElementById(id);
  if(el){el.className='msg '+type;el.textContent=text;}
}

window.addEventListener('beforeunload',e=>{
  if(dirty){e.preventDefault();e.returnValue='';}
});

init();
</script>
</body>
</html>
